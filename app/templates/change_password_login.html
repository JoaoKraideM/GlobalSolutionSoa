{% extends "base.html" %}

{% block content %}
<section class="panel auth-panel">
  <h1>Recuperar Senha</h1>
  <p class="lead">Informe seu e-mail e senha atual para definir uma nova senha.</p>

  <form method="post" action="{{ url_for('main.change_password_login_post') }}" class="js-safe-form form-grid">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

    <label for="email">E-mail</label>
    <input id="email" name="email" type="email"
      required maxlength="255" data-validate="sql"
      placeholder="seu@email.com">

    <label for="senha_atual">Senha atual</label>
    <input id="senha_atual" name="senha_atual" type="password"
      required maxlength="100"
      placeholder="Sua senha atual">

    <label for="nova_senha">Nova senha</label>
    <input id="nova_senha" name="nova_senha" type="password"
      required minlength="8" maxlength="100"
      placeholder="Ex.: Nova@12345">

    <button type="submit" class="btn" style="margin-top:4px">Salvar Nova Senha</button>
  </form>

  <p style="margin-top:16px;font-size:13px;color:var(--text-muted)">
    <a href="{{ url_for('auth.login') }}">Voltar ao login</a>
  </p>
</section>
{% endblock %}
