services:
  mineracao_espacial_viabilidade_web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mineracao_espacial_viabilidade_web
    env_file:
      - .env
    ports:
      - "5000:5000"
    depends_on:
      mineracao_espacial_viabilidade_db:
        condition: service_healthy
    restart: unless-stopped

  mineracao_espacial_viabilidade_db:
    image: mysql:8.0.37
    container_name: mineracao_espacial_viabilidade_db
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-mineracao_espacial_viabilidade}
    volumes:
      - mineracao_espacial_viabilidade_db_data:/var/lib/mysql
      - ./app/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p${DB_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  mineracao_espacial_viabilidade_db_data:
