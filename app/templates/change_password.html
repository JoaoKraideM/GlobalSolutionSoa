{% extends "base.html" %}

{% block content %}
<section class="panel auth-panel">
  <h1>Alteracao de Senha</h1>
  <p class="lead">A nova senha não pode repetir o historico recente de senhas utilizadas.</p>

  <form method="post" action="{{ url_for('auth.alterar_senha_post') }}" class="js-safe-form form-grid">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

    {% if current_role == "ADMIN" %}
      <label for="email_alvo">E-mail do colaborador (opcional)</label>
      <input id="email_alvo" name="email_alvo" type="email"
        maxlength="255" data-validate="sql"
        placeholder="Vazio = altera sua propria senha">
    {% endif %}

    <label for="senha_atual">Senha atual</label>
    <input id="senha_atual" name="senha_atual" type="password"
      maxlength="100"
      placeholder="Obrigatoria ao alterar sua propria senha">

    <label for="nova_senha">Nova senha</label>
    <input id="nova_senha" name="nova_senha" type="password"
      required minlength="8" maxlength="100"
      placeholder="Ex.: Nova@12345">

    <button type="submit" class="btn" style="margin-top:4px">Salvar Nova Senha</button>
  </form>
</section>
{% endblock %}
